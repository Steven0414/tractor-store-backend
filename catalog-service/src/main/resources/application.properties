# ──────────────────────────────────────────────────────────
# Datasource — PostgreSQL
# Override via env vars: SPRING_DATASOURCE_URL, etc.
# ──────────────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tractordb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:tractoruser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:tractorpass}
spring.datasource.driver-class-name=org.postgresql.Driver

# ──────────────────────────────────────────────────────────
# HikariCP connection pool
# ──────────────────────────────────────────────────────────
spring.datasource.hikari.pool-name=TractorHikariPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000

# ──────────────────────────────────────────────────────────
# JPA / Hibernate
# Schema managed exclusively by Flyway — never let Hibernate modify it
# ──────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ──────────────────────────────────────────────────────────
# Flyway — controlled schema migrations
# ──────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

# ──────────────────────────────────────────────────────────
# Server
# ──────────────────────────────────────────────────────────
server.port=8080
