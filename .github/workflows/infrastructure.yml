name: 🏗️ Infrastructure Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'catalog-service/Dockerfile'
      - '.github/workflows/infrastructure.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/tractor-store-catalog-service
  JAVA_VERSION: '17'

jobs:
  # ─── 1. Validate Dockerfile ──────────────────────────────────────────────────
  validate:
    name: Lint Dockerfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint catalog-service Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: catalog-service/Dockerfile

  # ─── 2. Build JAR & Docker Image ─────────────────────────────────────────────
  build-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Extract project version from pom.xml
        id: version
        working-directory: catalog-service
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Project version: ${VERSION}"

      - name: Build JAR (tests covered in build-deploy pipeline)
        working-directory: catalog-service
        run: mvn package -DskipTests --no-transfer-progress

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & push catalog-service image
        uses: docker/build-push-action@v5
        with:
          context: ./catalog-service
          file: ./catalog-service/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── 3. Smoke Test Container ─────────────────────────────────────────────────
  smoke-test:
    name: Smoke Test – catalog-service
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main'
    permissions:
      packages: read

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull & run catalog-service
        run: |
          docker run -d \
            --name catalog-smoke \
            -p 8080:8080 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Wait for Spring Boot to be ready
        run: |
          for i in {1..20}; do
            if curl --silent --fail http://localhost:8080/api/products; then
              echo "✅ catalog-service is up"
              exit 0
            fi
            echo "Waiting... ($i/20)"
            sleep 5
          done
          echo "❌ catalog-service did not respond in time"
          docker logs catalog-smoke
          exit 1

      - name: Teardown
        if: always()
        run: |
          docker stop catalog-smoke || true
          docker rm   catalog-smoke || true
