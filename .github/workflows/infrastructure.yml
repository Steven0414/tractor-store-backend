name: 🏗️ Infrastructure Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'pom.xml'
      - 'src/**'
      - '.github/workflows/infrastructure.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: tractor-store-backend
  JAVA_VERSION: '21'

jobs:
  # ─── 1. Validate Dockerfile ──────────────────────────────────────────────────
  validate:
    name: Lint Dockerfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint tractor-store Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

  # ─── 2. Build JAR & Docker Image ─────────────────────────────────────────────
  build-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Extract project version from pom.xml
        id: version
        working-directory: .
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Project version: ${VERSION}"

      - name: Build JAR (tests covered in build-deploy pipeline)
        working-directory: .
        run: mvn package -DskipTests --no-transfer-progress

      - name: Compute image name (lowercase)
        id: image
        run: |
          OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "name=${OWNER_LC}/${{ env.IMAGE_NAME }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & push tractor-store image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── 3. Smoke Test Container ─────────────────────────────────────────────────
  smoke-test:
    name: Smoke Test – tractor-store
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main'
    permissions:
      packages: read

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image name (lowercase)
        id: image
        run: |
          OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "name=${OWNER_LC}/${{ env.IMAGE_NAME }}" >> "$GITHUB_OUTPUT"

      - name: Start PostgreSQL for smoke test
        run: |
          docker network create smoke-net
          docker run -d \
            --name smoke-postgres \
            --network smoke-net \
            -e POSTGRES_DB=tractordb \
            -e POSTGRES_USER=tractoruser \
            -e POSTGRES_PASSWORD=tractorpass \
            postgres:16-alpine

      - name: Pull & run tractor-store
        run: |
          docker run -d \
            --name tractor-store-smoke \
            --network smoke-net \
            -p 8080:8080 \
            -e DB_URL=jdbc:postgresql://smoke-postgres:5432/tractordb \
            -e DB_USER=tractoruser \
            -e DB_PASSWORD=tractorpass \
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:latest

      - name: Wait for Spring Boot to be ready
        run: |
          for i in {1..20}; do
            if curl --silent --fail http://localhost:8080/api/catalog/home; then
              echo "✅ tractor-store is up"
              exit 0
            fi
            echo "Waiting... ($i/20)"
            sleep 5
          done
          echo "❌ tractor-store did not respond in time"
          docker logs tractor-store-smoke
          exit 1

      - name: Teardown
        if: always()
        run: |
          docker stop tractor-store-smoke || true
          docker rm   tractor-store-smoke || true
          docker stop smoke-postgres || true
          docker rm   smoke-postgres || true
          docker network rm smoke-net || true
