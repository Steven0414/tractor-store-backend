name: 🚀 Build & Deploy Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: tractor-store-backend
  JAVA_VERSION: '21'

jobs:
  # ─── 1. Quality Gate: Static Analysis ───────────────────────────────────────
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Compile source (strict – no tests)
        working-directory: tractor-store
        run: mvn compile --no-transfer-progress

      - name: Check code style with Checkstyle
        working-directory: tractor-store
        run: mvn checkstyle:check --no-transfer-progress || echo "⚠️ Checkstyle plugin not configured – skipping"

      - name: Dependency vulnerability scan
        working-directory: tractor-store
        run: |
          mvn dependency:analyze --no-transfer-progress 2>&1 | \
            grep -E "(WARNING|ERROR|unused declared|undeclared)" || true

  # ─── 2. Unit Tests with Coverage Enforcement ────────────────────────────────
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run tests with JaCoCo coverage
        working-directory: tractor-store
        run: mvn test jacoco:report --no-transfer-progress

      - name: Enforce coverage thresholds (70% lines & branches)
        working-directory: tractor-store
        run: |
          REPORT="target/site/jacoco/jacoco.xml"
          if [ ! -f "$REPORT" ]; then
            echo "⚠️  JaCoCo XML report not found – skipping threshold check"
            exit 0
          fi

          MISSED=$(python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('$REPORT')
          root = tree.getroot()
          for counter in root.findall('counter'):
              if counter.get('type') == 'LINE':
                  missed   = int(counter.get('missed'))
                  covered  = int(counter.get('covered'))
                  total    = missed + covered
                  pct      = int(covered * 100 / total) if total else 0
                  print(f'LINE {pct}')
              if counter.get('type') == 'BRANCH':
                  missed   = int(counter.get('missed'))
                  covered  = int(counter.get('covered'))
                  total    = missed + covered
                  pct      = int(covered * 100 / total) if total else 0
                  print(f'BRANCH {pct}')
          ")

          THRESHOLD=70
          FAILED=0
          while IFS= read -r line; do
            TYPE=$(echo "$line" | awk '{print $1}')
            PCT=$(echo "$line"  | awk '{print $2}')
            echo "📊 ${TYPE} coverage: ${PCT}%"
            if [ "$PCT" -lt "$THRESHOLD" ]; then
              echo "❌ ${TYPE} ${PCT}% is below threshold of ${THRESHOLD}%"
              FAILED=1
            fi
          done <<< "$MISSED"

          [ "$FAILED" -eq 0 ] && echo "✅ All coverage thresholds met"
          exit $FAILED

      - name: Upload JaCoCo HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: tractor-store/target/site/jacoco/
          retention-days: 7

      - name: Upload Surefire test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: tractor-store/target/surefire-reports/
          retention-days: 7

  # ─── 3. Package – Build production JAR ──────────────────────────────────────
  build:
    name: Package JAR
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build production JAR
        working-directory: tractor-store
        run: mvn package -DskipTests --no-transfer-progress

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: tractor-store-jar
          path: tractor-store/target/*.jar
          retention-days: 1

  # ─── 4. Build & Push Docker Image ────────────────────────────────────────────
  dockerize:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Compute image name (lowercase)
        id: image
        run: |
          OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "name=${OWNER_LC}/${{ env.IMAGE_NAME }}" >> "$GITHUB_OUTPUT"

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: tractor-store-jar
          path: tractor-store/target/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & push tractor-store backend
        uses: docker/build-push-action@v5
        with:
          context: ./tractor-store
          file: ./tractor-store/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── 5. Deploy ───────────────────────────────────────────────────────────────
  deploy:
    name: Deploy – ${{ github.ref == 'refs/heads/main' && 'Production' || 'Staging' }}
    runs-on: ubuntu-latest
    needs: dockerize
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
      url: ${{ vars.DEPLOY_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Compute image name (lowercase)
        id: image
        run: |
          OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "name=${OWNER_LC}/${{ env.IMAGE_NAME }}" >> "$GITHUB_OUTPUT"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e
            cd /opt/tractor-store/backend

            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            export IMAGE_TAG=${{ github.sha }}
            export REGISTRY=${{ env.REGISTRY }}
            export IMAGE_NAME=${{ steps.image.outputs.name }}

            docker compose pull
            docker compose up -d --remove-orphans
            docker system prune -f

            echo "✅ Deployment complete – ${{ github.sha }}"
