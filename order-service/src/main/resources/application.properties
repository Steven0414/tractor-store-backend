spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tractordb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:tractoruser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:tractorpass}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.pool-name=OrderHikariPool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.flyway.enabled=false
server.port=8083
order.events.order-placed.subscribers=http://inventory-service:8081/internal/events/order-placed,http://cart-service:8082/internal/events/order-placed,http://notifications-service:8084/internal/events/order-placed
