services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tractordb
      POSTGRES_USER: ${POSTGRES_USER:-tractoruser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tractorpass}
    ports:
      - "54320:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tractoruser} -d tractordb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  tractor-store:
    build:
      context: .
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/tractordb
      DB_USER: ${POSTGRES_USER:-tractoruser}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-tractorpass}
      PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
