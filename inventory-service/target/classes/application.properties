# ──────────────────────────────────────────────────────────
# Datasource — PostgreSQL
# Override via env vars: SPRING_DATASOURCE_URL, etc.
# ──────────────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tractordb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:tractoruser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:tractorpass}
spring.datasource.driver-class-name=org.postgresql.Driver

# ──────────────────────────────────────────────────────────
# HikariCP connection pool
# ──────────────────────────────────────────────────────────
spring.datasource.hikari.pool-name=InventoryHikariPool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1

# ──────────────────────────────────────────────────────────
# JPA / Hibernate
# Schema managed exclusively by catalog-service via Flyway
# ──────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ──────────────────────────────────────────────────────────
# Flyway — disabled: schema owned by catalog-service
# ──────────────────────────────────────────────────────────
spring.flyway.enabled=false

# ──────────────────────────────────────────────────────────
# Server
# ──────────────────────────────────────────────────────────
server.port=8081
